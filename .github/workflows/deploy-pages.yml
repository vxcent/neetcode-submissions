name: Deploy GitHub Pages

# Publishes the repo as a static site: landing hub (index.html),
# the interview-prep study kit (study/), and the pattern trainer (trainer/).
# Requires Settings -> Pages -> Source: "GitHub Actions" (one-time, manual).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # whole repo; index.html at root is the landing page

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
